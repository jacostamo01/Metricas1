name: SonarCloud Analysis

on:
  push:
    branches:
      - main
  pull_request:
    types: [opened, synchronize, reopened]

jobs:
  build:
    name: Build and analyze
    runs-on: windows-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true 

    steps:
      - name: Set up JDK 17
        uses: actions/setup-java@v5 
        with:
          java-version: 17
          distribution: 'zulu'

      - uses: actions/checkout@v5 
        with:
          fetch-depth: 0 

      - name: Install SonarCloud scanner
        shell: pwsh
        run: |
          dotnet tool install --global dotnet-sonarscanner

      - name: Build and analyze
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }} # El secreto se carga aquí como variable de entorno
        shell: pwsh
        run: |
          # Usamos $env:SONAR_TOKEN de PowerShell para que el secreto no se expanda en el comando
          dotnet-sonarscanner begin /k:"jacostamo01_Metricas1" /o:"jacostamo01" /d:sonar.token="$env:SONAR_TOKEN" /d:sonar.host.url="https://sonarcloud.io"
          
          dotnet build TU_SOLUCION.sln
          
          dotnet-sonarscanner end /d:sonar.token="$env:SONAR_TOKEN"